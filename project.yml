name: TippyCam
options:
  bundleIdPrefix: com.parmscript
  deploymentTarget:
    iOS: "26.5"
  createIntermediateGroups: true
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 7654L3CX5L
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: "1"
targets:
  TippyCam:
    type: application
    platform: iOS
    sources:
      - TippyCam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parmscript.tippycam
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 2026062007
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: TippyCam
        INFOPLIST_KEY_NSCameraUsageDescription: TippyCam uses the camera to take photos.
        INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: TippyCam saves photos to your library.
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: TippyCam shows your photo library in the in-app gallery.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  TippyCamTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TippyCamTests
    dependencies:
      - target: TippyCam
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
